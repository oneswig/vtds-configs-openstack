provider:
  # This configuration provides the organization independent
  # configuration for the GCP provider layer needed to run
  # OpenCHAMI. Your organization should also provide the GCP
  # organization specific configuration that allows deployment of
  # resources into GCP.  See the 'vtds-provider-gcp' README.md file for
  # more information on this.
  organization: {}
  project: {}
  blade_interconnects:
    blade-interconnect:
      # A blade interconnect for testing interconnect inheritance
      parent_class: base-interconnect
      pure_base_class: false
      network_name: "blade-interconnect"
      description: |
        A blade interconnect based on 'base interconnect' to facilitate testing
        of blade interconnect inheritance.
      routes: []
  virtual_blades:
    # Host blade. This is normally the host blade class for both Management
    # and Compute nodes. By doing it this way, we can create a vTDS with
    # a management node and up to 4 compute nodes on a single GCP
    # instance, thereby keeping costs down for small development and
    # test systems.
    host-blade:
      count: 1
      lab_flavor: "general.v1.large"
      boot_labs_from_volume: true
      image_id: "b709c1c0-f045-4918-9297-43f52a730241"
      image_name: "Ubuntu-24.04"
      lab_data_vol: 100
      lab_prefix: "host-blade"
      blade_interconnect:
        subnetwork: "blade-interconnect"
        lab_net_ipv4: "stackhpc-academy"
        lab_subnet: "034fdc5e-ad1f-431b-b3dd-3d1549fe33e7"
        ip_addrs:
          - "172.16.4.4"
          - "172.16.4.5"
          - "172.16.4.6"
          - "172.16.4.7"

      # OpenCHAMI Application metadata for the Virtual Blades
      application_metadata:
        # Map these xnames onto the Cluster Layer node names (which are
        # xnames in OpenCHAMI). These should be the parent names for the
        # Virtual Nodes that reside on the respective Virtual Blades.
        #
        # The agreed upon scheme here is that blades are 0 through 3
        # in their respective Shelves..
        xnames:
          - x2000c0s0b0
          - x2000c0s0b1
          - x2000c0s0b2
          - x2000c0s0b3
          - x2000c0s1b0
          - x2000c0s1b1
          - x2000c0s1b2
          - x2000c0s1b3
          - x2000c0s2b0
          - x2000c0s2b1
          - x2000c0s2b2
          - x2000c0s2b3
          - x2000c0s3b0
          - x2000c0s3b1
          - x2000c0s3b2
          - x2000c0s3b3
