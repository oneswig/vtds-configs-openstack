# Cluster layer configuration for deploying OpenCHAMI on vTDS
cluster:
  # Configure the name server list on the host network. That way, all
  # nodes get a name server from the start. It might make sense to do
  # this differently for compute nodes for booting, but I think that
  # will be okay because of DHCP.
  host_blade_network:
    address_families:
      ipv4:
        name_servers:
          - 169.254.169.254
  networks:
    management_network:
      network_name: mgmtnet
      tunnel_id: 10
      devices:
        bridge: br-mgmtnet
        tunnel: mgmtnet
        local:
          peer: bl-mgmtnet-p
          interface: bl-mgmtnet
      blade_interconnect: blade-interconnect
      address_families:
        ipv4:
          family: AF_INET
          cidr: 10.1.1.0/24
          gateway: 10.1.1.1
          connected_blades:
            - blade_class: host-blade
              addresses:
                - 10.1.1.1
              dhcp_server_instance: 0
          dhcp:
            enabled: false
            pools:
              - start: 10.1.1.64
                end: 10.1.1.254
    compute_network:
      network_name: compnet
      tunnel_id: 20
      devices:
        bridge: br-compnet
        tunnel: compnet
        local:
          peer: bl-compnet-p
          interface: bl-compnet
      blade_interconnect: blade-interconnect
      address_families:
        ipv4:
          family: AF_INET
          cidr: 10.2.1.0/24
          gateway: null
          name_servers: []
          connected_blades:
            - blade_class: host-blade
              addresses:
                - 10.2.1.1
              dhcp_server_instance: 0
          dhcp:
            enabled: false
            pools:
              - start: 10.2.1.32
                end: 10.2.1.254
      application_metadata:
        # For now, define a single pool for CoreDHCP to use in its
        # config. We can revisit this later. We can also revisit whether
        # we want an API into Virtual Networks for getting DHCP
        # configuration from the network, which would be a bit cleaner.
        coredhcp:
          pool:
            start: 10.2.1.32
            end: 10.2.1.254
    hardware_network:
      network_name: hwmgtnet
      tunnel_id: 30
      devices:
        bridge: br-hwmgtnet
        tunnel: hwmgtnet
        local:
          peer: bl-hwmgtnet-p
          interface: bl-hwmgtnet
      blade_interconnect: blade-interconnect
      address_families:
        ipv4:
          family: AF_INET
          cidr: 10.3.1.0/24
          gateway: null
          name_servers: []
          connected_blades:
            - blade_class: host-blade
              addresses:
                - 10.3.1.1
                - 10.3.1.2
                - 10.3.1.3
                - 10.3.1.4
                - 10.3.1.5
                - 10.3.1.6
                - 10.3.1.7
                - 10.3.1.8
                - 10.3.1.9
                - 10.3.1.10
                - 10.3.1.11
                - 10.3.1.12
                - 10.3.1.13
                - 10.3.1.14
                - 10.3.1.15
                - 10.3.1.16
              dhcp_server_instance: 0
          dhcp:
            enabled: false
            pools:
              - start: 10.3.1.64
                end: 10.3.1.254
  node_classes:
    management_node:
      pure_base_class: false
      parent_class: rocky_linux_node
      node_count: 1
      virtual_machine:
        cpu_count: 2  # Want a little more CPU than the minimum
      host_blade:
        blade_class: host-blade
        instance_capacity: 1
      node_naming:
        base_name: management
        # In this configuration, there is one management node and it
        # lives on the same blade as the first 4 compute nodes. It will
        # be assigned an xname by the Application layer that is beyond
        # the xnames of managed nodes on this blade to keep managed node
        # naming consistent across blades.
        node_names: []
      host_naming:
        base_name: management
      network_interfaces:
        management_network:
          cluster_network: mgmtnet
          addr_info:
            ipv4:
              family: AF_INET
              mode: static
              addresses:
                - 10.1.1.2
                - 10.1.1.3
                - 10.1.1.4
                - 10.1.1.5
                - 10.1.1.6
                - 10.1.1.7
                - 10.1.1.8
                - 10.1.1.9
        compute_network:
          cluster_network: compnet
          addr_info:
            ipv4:
              family: AF_INET
              mode: static
              addresses:
                - 10.2.1.2
                - 10.2.1.3
                - 10.2.1.4
                - 10.2.1.5
                - 10.2.1.6
                - 10.2.1.7
                - 10.2.1.8
                - 10.2.1.9
        hardware_network:
          cluster_network: hwmgtnet
          addr_info:
            ipv4:
              family: AF_INET
              mode: static
              addresses:
                - 10.3.1.24
                - 10.3.1.25
                - 10.3.1.26
                - 10.3.1.27
                - 10.3.1.28
                - 10.3.1.29
                - 10.3.1.30
                - 10.3.1.31
      application_metadata:
        # node_role is either management or managed. Managed nodes will
        # be included in discovery data and assigned NIDs. Management
        # nodes will not.
        node_role: management
        # Specify which network is the cluster network for this node
        cluster_net_interface: compnet
    compute_node:
      pure_base_class: false
      parent_class: rocky_net_boot
      # No compute nodes by default. Increase this number to have
      # compute nodes in the system. Since the host blade capacity is 4
      # compute nodes, if you add more than 4 compute nodes, you will
      # need to increase the number of host blades accordingly in the
      # provider configuration.
      node_count: 0
      virtual_machine:
        cpu_count: 1
        boot_info:
          interfaces:
            - compute_network
      host_blade:
        blade_class: host-blade
        instance_capacity: 4
      node_naming:
        base_name: compute
        # On OpenCHAMI, node names are xnames because that is
        # convenient, and those xnames are computed by the Application
        # layer and injected into the cluster layer during
        # consolidate(). Don't configure any node names here...
        node_names: []
      host_naming:
        base_name: compute
      network_interfaces:
        compute_network:
          cluster_network: compnet
          addr_info:
            ipv4:
              family: AF_INET
              mode: reserved
              addresses:
                - 10.2.1.32
                - 10.2.1.33
                - 10.2.1.34
                - 10.2.1.35
                - 10.2.1.36
                - 10.2.1.37
                - 10.2.1.38
                - 10.2.1.39
                - 10.2.1.40
                - 10.2.1.41
                - 10.2.1.42
                - 10.2.1.43
                - 10.2.1.44
                - 10.2.1.45
                - 10.2.1.46
                - 10.2.1.47
      application_metadata:
        # node_role is either management or managed. Managed nodes will
        # be included in discovery data and assigned NIDs. Management
        # nodes will not.
        node_role: managed
        # node_group identifies a group of nodes (for example 'compute')
        # that the nodes in this class belong to. Used in generating
        # static discovery data.
        node_group: compute
        # Which network is the cluster network for this node
        cluster_net_interface: compnet
